services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nameplates
      POSTGRES_USER: nameplates
      POSTGRES_PASSWORD: nameplates
    volumes:
      - nameplates-db-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nameplates -d nameplates"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      target: api
    environment:
      PORT: 5000
      DATABASE_URL: postgres://nameplates:nameplates@db:5432/nameplates
      ADMIN_PASSWORD: local-dev-password
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      target: web
    ports:
      - "8090:8080"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  nameplates-db-data:
